<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 420px;
      padding: 25px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #ff0050;
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      border-radius: 12px;
    }

    .btn:hover {
      background: #e60046;
    }

    .small {
      margin-top: 18px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🔥 Veja o que está viralizando agora</h1>
    <p>Clique abaixo para continuar e assistir.</p>

    <a class="btn" href="https://www.tiktok.com/" id="goBtn">
      👉 Assistir no TikTok
    </a>

    <div class="small">Redirecionamento seguro</div>
  </div>

  <script>
    // Troque o link abaixo pelo seu link do TikTok
    const tiktokLink = "https://www.tiktok.com/";

    document.getElementById("goBtn").href = tiktokLink;
  </script>
</body>
</html>
