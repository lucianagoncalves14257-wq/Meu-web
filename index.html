<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<script>
// pega o clickid da URL
function getClickID() {
    const params = new URLSearchParams(window.location.search);
    return params.get("clickid") || "";
}

// redireciona pro link do jogo
function redirect() {
    let clickid = getClickID();

    let url = "https://www.tiktok.com/d/1/ZT9N7NVavUqcE-s1ACU/";

    if (clickid) {
        url += (url.includes("?") ? "&" : "?") + "clickid=" + clickid;
    }

    window.location.href = url;
}

// redireciona automático (rápido)
window.onload = redirect;
</script>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

.container {
    margin-top: 40%;
}

button {
    background: #ff0050;
    color: #fff;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">
    <h1>🔄 Loading...</h1>
    <p>Please wait</p>
    <button onclick="redirect()">Continue</button>
</div>

</body>
</html>
